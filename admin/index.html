<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Inbox | S40 Construction</title>
    <meta name="description" content="Responsive admin inbox for client messages." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet" />
    <link href="../assets/css/style.css" rel="stylesheet" />
    <link href="../assets/css/admin.css" rel="stylesheet" />
      <style>
      body {
        min-height: 100vh;
      }
      .admin-shell {
        min-height: 100vh;
        padding: 2rem 0 3rem;
      }

      .admin-card {
        border-radius: 28px;
        padding: 1.5rem;
        background: rgba(255,255,255,0.95);
        box-shadow: 0 20px 45px rgba(7, 26, 47, 0.16);
      }
      .admin-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 1rem;
        margin-bottom: 1.25rem;
      }
      .admin-header h1 {
        font-size: clamp(1.5rem, 2.5vw, 2rem);
        margin: 0;
        color: var(--navy-dark);
      }
      .pill {
        display: inline-flex;
        align-items: center;
        gap: .5rem;
        padding: .6rem 1rem;
        border-radius: 999px;
        background: rgba(201, 162, 39, 0.14);
        color: var(--gold);
        font-weight: 600;
      }
      .message-list {
        display: grid;
        gap: 1rem;
      }
      .message-item {
        border-radius: 20px;
        border: 1px solid rgba(7, 26, 47, 0.08);
        background: linear-gradient(135deg, rgba(255,255,255,.96), rgba(248,251,255,.96));
        padding: 1rem 1.1rem;
        transition: transform .2s ease, box-shadow .2s ease;
      }
      .message-item:hover {
        transform: translateY(-2px);
        box-shadow: 0 12px 24px rgba(7, 26, 47, 0.08);
      }
      .message-top {
        display: flex;
        justify-content: space-between;
        gap: 1rem;
        align-items: flex-start;
        margin-bottom: .6rem;
      }
      .message-actions {
        display: flex;
        align-items: center;
        gap: .5rem;
      }
      .delete-btn {
        border: none;
        background: rgba(220, 53, 69, 0.12);
        color: #b42318;
        border-radius: 999px;
        padding: .45rem .7rem;
        cursor: pointer;
        font-weight: 600;
      }
      .delete-btn:hover {
        background: rgba(220, 53, 69, 0.2);
      }
      .message-name {
        font-weight: 700;
        color: var(--navy-dark);
      }
      .message-meta {
        color: var(--steel);
        font-size: .9rem;
      }
      .empty-state {
        text-align: center;
        padding: 2rem 1rem;
        color: var(--steel);
        border: 1px dashed rgba(7, 26, 47, 0.14);
        border-radius: 20px;
      }
      .message-body {
        color: var(--steel);
        line-height: 1.75;
        margin-bottom: .5rem;
      }
      .message-tags { display: flex; flex-wrap: wrap; gap: .5rem; }
      .tag {
        display: inline-flex;
        padding: .35rem .7rem;
        border-radius: 999px;
        background: rgba(201, 162, 39, 0.14);
        color: var(--gold);
        font-size: .78rem;
        font-weight: 600;
      }
      @media (max-width: 768px) {
        .admin-shell { padding: 1rem 0 2rem; }
        .admin-card { padding: 1rem; border-radius: 20px; }
        .admin-header { flex-direction: column; align-items: flex-start; }
        .message-top { flex-direction: column; }
      }
    </style>
  </head>
  <body>
    <div class="admin-bg-live" aria-hidden="true">
      <div class="bg-overlay"></div>
      <canvas id="admin-bg-canvas"></canvas>
    </div>

    <div class="admin-shell">
      <div class="container">
        <div class="admin-card">

          <div class="admin-header">
            <div>
              <div class="eyebrow">Admin Dashboard</div>
              <h1>Client Messages Inbox</h1>
            </div>
            <div class="pill"><i class="fa-solid fa-envelope"></i><span id="message-count">0 new messages</span></div>
          </div>
          <div id="message-list" class="message-list"></div>
        </div>
      </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-database-compat.js"></script>
    <script src="../assets/js/main.js"></script>
    <script>
      // Live admin background particles
      (function initAdminParticles() {
        const canvas = document.getElementById('admin-bg-canvas');
        if (!canvas) return;

        const ctx = canvas.getContext('2d');
        let width = 0;
        let height = 0;

        const prefersReduced = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        const DPR = Math.min(window.devicePixelRatio || 1, 2);

        const config = {
          particleCount: prefersReduced ? 20 : 70,
          linkDistance: 110,
          speed: prefersReduced ? 0.15 : 0.35,
          maxRadius: prefersReduced ? 2.2 : 3.2,
          minRadius: 0.8,
          bgFade: 0.18
        };

        let particles = [];
        let rafId = null;

        const rand = (min, max) => Math.random() * (max - min) + min;

        const resize = () => {
          const rect = canvas.getBoundingClientRect();
          width = Math.max(1, Math.floor(rect.width));
          height = Math.max(1, Math.floor(rect.height));
          canvas.width = Math.floor(width * DPR);
          canvas.height = Math.floor(height * DPR);
          canvas.style.width = width + 'px';
          canvas.style.height = height + 'px';
          ctx.setTransform(DPR, 0, 0, DPR, 0, 0);

          // rebuild particles on resize
          particles = Array.from({ length: config.particleCount }, () => ({
            x: Math.random() * width,
            y: Math.random() * height,
            vx: (Math.random() - 0.5) * config.speed,
            vy: (Math.random() - 0.5) * config.speed,
            r: rand(config.minRadius, config.maxRadius)
          }));
        };

        const draw = () => {
          // clear with transparency for smoother trails
          ctx.fillStyle = `rgba(7, 26, 47, ${config.bgFade})`;
          ctx.fillRect(0, 0, width, height);

          // particles
          for (const p of particles) {
            p.x += p.vx;
            p.y += p.vy;

            if (p.x < -10) p.x = width + 10;
            if (p.x > width + 10) p.x = -10;
            if (p.y < -10) p.y = height + 10;
            if (p.y > height + 10) p.y = -10;

            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(201,162,39,.35)';
            ctx.fill();
          }

          // links
          ctx.lineWidth = 1;
          for (let i = 0; i < particles.length; i++) {
            for (let j = i + 1; j < particles.length; j++) {
              const a = particles[i];
              const b = particles[j];
              const dx = a.x - b.x;
              const dy = a.y - b.y;
              const dist = Math.hypot(dx, dy);
              if (dist < config.linkDistance) {
                const alpha = 1 - dist / config.linkDistance;
                ctx.strokeStyle = `rgba(255,255,255,${0.16 * alpha})`;
                ctx.beginPath();
                ctx.moveTo(a.x, a.y);
                ctx.lineTo(b.x, b.y);
                ctx.stroke();
              }
            }
          }

          rafId = requestAnimationFrame(draw);
        };

        const start = () => {
          resize();
          if (!prefersReduced) {
            rafId = requestAnimationFrame(draw);
          } else {
            // single frame for reduced motion
            draw();
            if (rafId) cancelAnimationFrame(rafId);
          }
        };

        let resizeTimer = null;
        window.addEventListener('resize', () => {
          clearTimeout(resizeTimer);
          resizeTimer = setTimeout(() => {
            if (rafId) cancelAnimationFrame(rafId);
            start();
          }, 150);
        });

        start();
      })();

      const storageKey = 's40-client-messages';
      const list = document.getElementById('message-list');
      const countBadge = document.getElementById('message-count');

      function formatDate(iso) {
        try {
          return new Date(iso).toLocaleString([], {
            dateStyle: 'medium',
            timeStyle: 'short'
          });
        } catch {
          return '';
        }
      }

      function renderMessages(messages) {
        const safe = Array.isArray(messages) ? messages : [];
        countBadge.textContent = `${safe.length} ${safe.length === 1 ? 'message' : 'messages'}`;

        if (!safe.length) {
          list.innerHTML = '<div class="empty-state"><i class="fa-solid fa-inbox"></i><p>No client messages yet.</p></div>';
          return;
        }

        list.innerHTML = safe.map(message => `
          <article class="message-item">
            <div class="message-top">
              <div>
                <div class="message-name">${message.name || 'Client'}</div>
                <div class="message-meta">${message.email || 'No email provided'} • ${message.phone || 'No phone provided'}</div>
              </div>
              <div class="message-actions">
                <div class="message-meta">${formatDate(message.sentAt)}</div>
                <button class="delete-btn" type="button" data-id="${message.id || ''}" data-fbkey="${message.fbKey || ''}"><i class="fa-solid fa-trash"></i> Delete</button>
              </div>
            </div>
            <div class="message-tags">
              <span class="tag">${message.subject || 'New inquiry'}</span>
            </div>
            <p class="message-body">${message.message || 'No message content provided.'}</p>
          </article>
        `).join('');
      }

      function syncLocalCache(messages) {
        try {
          localStorage.setItem(storageKey, JSON.stringify(messages || []));
        } catch {
          // ignore
        }
      }

      function getLocalMessages() {
        try {
          return JSON.parse(localStorage.getItem(storageKey) || '[]');
        } catch {
          return [];
        }
      }

      list.addEventListener('click', async event => {
        const button = event.target.closest('.delete-btn');
        if (!button) return;

        const fbKey = button.getAttribute('data-fbkey');
        const id = button.getAttribute('data-id');

        // Delete from Firebase if we have the RTDB key, otherwise fall back to local cache
        if (window.firebaseDatabase && fbKey) {
          try {
            await window.firebaseDatabase.ref('messages').child(fbKey).remove();
          } catch (error) {
            console.warn('Unable to delete message from Firebase', error);
          }
        } else {
          const updated = getLocalMessages().filter(m => m.id !== id);
          syncLocalCache(updated);
          renderMessages(updated);
        }
      });

      // --- Primary: load from Firebase and keep in sync realtime ---
      (function initFirebaseInboxRealtime() {
        // assets/js/main.js exposes initFirebase + firebaseDatabase via window functions only if called.
        // However, in admin/index.html we can rely on loadMessagesFromSharedInbox if present.
        if (window.loadMessagesFromSharedInbox) {
          // this will load remote into local cache too (based on main.js)
          window.loadMessagesFromSharedInbox((msgs) => {
            renderMessages(msgs);
          });
        } else {
          renderMessages(getLocalMessages());
        }

        // For realtime updates, use RTDB listener if firebase is ready on this page.
        // main.js keeps firebaseDatabase in module scope; but we can still use it indirectly by calling loadMessagesFromSharedInbox.
        // If you want true realtime, we should add an RTDB listener script here; for now ensure cross-device sync works.
      })();

    </script>
  </body>
</html>
