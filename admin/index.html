<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Inbox | S40 Construction</title>
    <meta name="description" content="Responsive admin inbox for client messages." />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet" />
    <link href="../assets/css/style.css" rel="stylesheet" />
    <link href="../assets/css/admin.css" rel="stylesheet" />
      <style>
      body {
        min-height: 100vh;
      }
      .container {
        width: 100%;
        max-width: 900px;
        margin: 0 auto;
        padding: 0 1.25rem;
      }
      .admin-shell {
        min-height: 100vh;
        padding: 2rem 0 3rem;
      }

      .admin-card {
        border-radius: 28px;
        padding: 1.5rem;
        background: rgba(255,255,255,0.95);
        box-shadow: 0 20px 45px rgba(7, 26, 47, 0.16);
      }
      .admin-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 1rem;
        margin-bottom: 1.25rem;
      }
      .admin-header h1 {
        font-size: clamp(1.5rem, 2.5vw, 2rem);
        margin: 0;
        color: var(--navy-dark);
      }
      .pill {
        display: inline-flex;
        align-items: center;
        gap: .5rem;
        padding: .6rem 1rem;
        border-radius: 999px;
        background: rgba(255, 117, 31, 0.14);
        color: var(--gold);
        font-weight: 600;
      }
      .pill.live {
        background: rgba(34, 197, 94, 0.16);
        color: #15803d;
        box-shadow: 0 0 0 1px rgba(34, 197, 94, 0.14);
      }
      .toast {
        position: fixed;
        right: 1rem;
        bottom: 1rem;
        z-index: 99999;
        padding: .9rem 1rem;
        border-radius: 16px;
        background: rgba(7, 26, 47, 0.96);
        color: #fff;
        box-shadow: 0 16px 34px rgba(0,0,0,.24);
        transform: translateY(16px);
        opacity: 0;
        pointer-events: none;
        transition: opacity .25s ease, transform .25s ease;
        max-width: min(90vw, 320px);
      }
      .toast.show {
        opacity: 1;
        transform: translateY(0);
      }
      .message-list {
        display: grid;
        gap: 1rem;
      }
      .message-item {
        border-radius: 20px;
        border: 1px solid rgba(7, 26, 47, 0.08);
        background: linear-gradient(135deg, rgba(255,255,255,.96), rgba(248,251,255,.96));
        padding: 1rem 1.1rem;
        transition: transform .2s ease, box-shadow .2s ease;
      }
      .message-item:hover {
        transform: translateY(-2px);
        box-shadow: 0 12px 24px rgba(7, 26, 47, 0.08);
      }
      .message-top {
        display: flex;
        justify-content: space-between;
        gap: 1rem;
        align-items: flex-start;
        margin-bottom: .6rem;
      }
      .message-actions {
        display: flex;
        align-items: center;
        gap: .5rem;
      }
      .delete-btn {
        border: none;
        background: rgba(220, 53, 69, 0.12);
        color: #b42318;
        border-radius: 999px;
        padding: .45rem .7rem;
        cursor: pointer;
        font-weight: 600;
      }
      .delete-btn:hover {
        background: rgba(220, 53, 69, 0.2);
      }
      .message-name {
        font-weight: 700;
        color: var(--navy-dark);
      }
      .message-meta {
        color: var(--steel);
        font-size: .9rem;
      }
      .empty-state {
        text-align: center;
        padding: 2rem 1rem;
        color: var(--steel);
        border: 1px dashed rgba(7, 26, 47, 0.14);
        border-radius: 20px;
      }
      .message-body {
        color: var(--steel);
        line-height: 1.75;
        margin-bottom: .5rem;
      }
      .message-tags { display: flex; flex-wrap: wrap; gap: .5rem; }
      .tag {
        display: inline-flex;
        padding: .35rem .7rem;
        border-radius: 999px;
        background: rgba(255, 117, 31, 0.14);
        color: var(--gold);
        font-size: .78rem;
        font-weight: 600;
      }
      .admin-tabs {
        display: flex;
        gap: .5rem;
        margin-bottom: 1.5rem;
        border-bottom: 1px solid rgba(7, 26, 47, 0.08);
        padding-bottom: 1rem;
      }
      .tab-btn {
        border: none;
        background: transparent;
        color: var(--steel);
        font-weight: 600;
        cursor: pointer;
        padding: .5rem 1rem;
        border-bottom: 2px solid transparent;
        transition: all .2s ease;
      }
      .tab-btn.active {
        color: var(--gold);
        border-bottom-color: var(--gold);
      }
      .tab-btn:hover:not(.active) {
        color: var(--navy-dark);
      }
      .tab-content {
        display: none;
      }
      .tab-content.active {
        display: block;
      }
      .permanent-delete-btn {
        border: none;
        background: rgba(160, 40, 40, 0.18);
        color: #8b1a1a;
        border-radius: 999px;
        padding: .45rem .7rem;
        cursor: pointer;
        font-weight: 600;
        font-size: .8rem;
      }
      .permanent-delete-btn:hover {
        background: rgba(160, 40, 40, 0.28);
      }
      @media (max-width: 768px) {
        .admin-shell { padding: 1rem 0 2rem; }
        .admin-card { padding: 1rem; border-radius: 20px; }
        .admin-header { flex-direction: column; align-items: flex-start; gap: .75rem; }
        .admin-header h1 { font-size: 1.4rem; }
        .message-top { flex-direction: column; gap: .5rem; }
        .message-actions { flex-wrap: wrap; gap: .4rem; }
        .message-name { font-size: 1rem; }
        .message-meta { font-size: .82rem; }
        .message-body { font-size: .9rem; }
        .delete-btn { font-size: .82rem; padding: .35rem .6rem; }
        .tag { font-size: .72rem; }
        .pill { font-size: .85rem; padding: .45rem .8rem; }
        .toast { right: .5rem; bottom: .5rem; left: .5rem; max-width: 100%; font-size: .9rem; }
      }
      @media (max-width: 480px) {
        .admin-shell { padding: .75rem 0 1.5rem; }
        .admin-card { padding: .85rem; border-radius: 16px; }
        .admin-header h1 { font-size: 1.2rem; }
        .message-item { padding: .85rem .9rem; border-radius: 14px; }
        .eyebrow { font-size: .7rem; }
      }
    </style>
  </head>
  <body>
    <div class="admin-bg-live" aria-hidden="true">
      <div class="bg-overlay"></div>
      <canvas id="admin-bg-canvas"></canvas>
    </div>

    <div class="admin-shell">
      <div class="container">
        <div class="admin-card">

          <div class="admin-header">
            <div>
              <div class="eyebrow">Admin Dashboard</div>
              <h1>Client Messages Inbox</h1>
            </div>
            <div class="pill" id="live-pill"><i class="fa-solid fa-envelope"></i><span id="message-count">0 new messages</span></div>
          </div>

          <div class="admin-tabs">
            <button class="tab-btn active" data-tab="inbox"><i class="fa-solid fa-inbox"></i> Inbox</button>
            <button class="tab-btn" data-tab="history"><i class="fa-solid fa-trash"></i> Delete History</button>
          </div>

          <div id="inbox-tab" class="tab-content active">
            <div id="message-list" class="message-list"></div>
          </div>

          <div id="history-tab" class="tab-content">
            <div id="deleted-list" class="message-list"></div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-database-compat.js"></script>
    <script src="../assets/js/main.js"></script>
    <script>
      // Live admin background particles
      (function initAdminParticles() {
        const canvas = document.getElementById('admin-bg-canvas');
        if (!canvas) return;

        const ctx = canvas.getContext('2d');
        let width = 0;
        let height = 0;

        const prefersReduced = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        const DPR = Math.min(window.devicePixelRatio || 1, 2);

        const config = {
          particleCount: prefersReduced ? 20 : 70,
          linkDistance: 110,
          speed: prefersReduced ? 0.15 : 0.35,
          maxRadius: prefersReduced ? 2.2 : 3.2,
          minRadius: 0.8,
          bgFade: 0.18
        };

        let particles = [];
        let rafId = null;

        const rand = (min, max) => Math.random() * (max - min) + min;

        const resize = () => {
          const rect = canvas.getBoundingClientRect();
          width = Math.max(1, Math.floor(rect.width));
          height = Math.max(1, Math.floor(rect.height));
          canvas.width = Math.floor(width * DPR);
          canvas.height = Math.floor(height * DPR);
          canvas.style.width = width + 'px';
          canvas.style.height = height + 'px';
          ctx.setTransform(DPR, 0, 0, DPR, 0, 0);

          // rebuild particles on resize
          particles = Array.from({ length: config.particleCount }, () => ({
            x: Math.random() * width,
            y: Math.random() * height,
            vx: (Math.random() - 0.5) * config.speed,
            vy: (Math.random() - 0.5) * config.speed,
            r: rand(config.minRadius, config.maxRadius)
          }));
        };

        const draw = () => {
          // clear with transparency for smoother trails
          ctx.fillStyle = `rgba(7, 26, 47, ${config.bgFade})`;
          ctx.fillRect(0, 0, width, height);

          // particles
          for (const p of particles) {
            p.x += p.vx;
            p.y += p.vy;

            if (p.x < -10) p.x = width + 10;
            if (p.x > width + 10) p.x = -10;
            if (p.y < -10) p.y = height + 10;
            if (p.y > height + 10) p.y = -10;

            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255,117,31,.35)';
            ctx.fill();
          }

          // links
          ctx.lineWidth = 1;
          for (let i = 0; i < particles.length; i++) {
            for (let j = i + 1; j < particles.length; j++) {
              const a = particles[i];
              const b = particles[j];
              const dx = a.x - b.x;
              const dy = a.y - b.y;
              const dist = Math.hypot(dx, dy);
              if (dist < config.linkDistance) {
                const alpha = 1 - dist / config.linkDistance;
                ctx.strokeStyle = `rgba(255,255,255,${0.16 * alpha})`;
                ctx.beginPath();
                ctx.moveTo(a.x, a.y);
                ctx.lineTo(b.x, b.y);
                ctx.stroke();
              }
            }
          }

          rafId = requestAnimationFrame(draw);
        };

        const start = () => {
          resize();
          if (!prefersReduced) {
            rafId = requestAnimationFrame(draw);
          } else {
            // single frame for reduced motion
            draw();
            if (rafId) cancelAnimationFrame(rafId);
          }
        };

        let resizeTimer = null;
        window.addEventListener('resize', () => {
          clearTimeout(resizeTimer);
          resizeTimer = setTimeout(() => {
            if (rafId) cancelAnimationFrame(rafId);
            start();
          }, 150);
        });

        start();
      })();

      const storageKey = 's40-client-messages';
      const deletedHistoryKey = 's40-deleted-messages';
      const list = document.getElementById('message-list');
      const deletedList = document.getElementById('deleted-list');
      const countBadge = document.getElementById('message-count');
      const livePill = document.getElementById('live-pill');
      let lastMessageCount = 0;

      // Tab switching
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const tabName = btn.getAttribute('data-tab');
          document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
          document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
          btn.classList.add('active');
          document.getElementById(tabName + '-tab').classList.add('active');
        });
      });

      function showToast(message) {
        let toast = document.querySelector('.toast');
        if (!toast) {
          toast = document.createElement('div');
          toast.className = 'toast';
          document.body.appendChild(toast);
        }
        toast.textContent = message;
        toast.classList.add('show');
        clearTimeout(showToast.timeout);
        showToast.timeout = setTimeout(() => {
          toast.classList.remove('show');
        }, 3000);
      }

      function updateLiveBadge(count) {
        if (!livePill) return;
        const isLive = count > 0;
        livePill.classList.toggle('live', isLive);
        livePill.innerHTML = `<i class="fa-solid ${isLive ? 'fa-bolt' : 'fa-envelope'}"></i><span id="message-count">${count} ${count === 1 ? 'message' : 'messages'}</span>`;
      }

      function formatDate(iso) {
        try {
          return new Date(iso).toLocaleString([], {
            dateStyle: 'medium',
            timeStyle: 'short'
          });
        } catch {
          return '';
        }
      }

      function renderMessages(messages) {
        const safe = Array.isArray(messages) ? messages : [];
        const currentCount = safe.length;
        console.log('Rendering', currentCount, 'messages:', safe.map(m => ({ id: m.id, fbKey: m.fbKey, name: m.name })));
        
        // DEBUG: Log all keys
        safe.forEach((m, i) => {
          if (!m.fbKey) {
            console.error(`Message ${i} (${m.id}) is MISSING fbKey!`);
          }
        });
        
        updateLiveBadge(currentCount);

        if (currentCount > lastMessageCount && lastMessageCount !== 0) {
          showToast(`New message received (${currentCount})`);
        }
        lastMessageCount = currentCount;

        if (!safe.length) {
          list.innerHTML = '<div class="empty-state"><i class="fa-solid fa-inbox"></i><p>No client messages yet.</p></div>';
          return;
        }

        list.innerHTML = safe.map(message => `
          <article class="message-item">
            <div class="message-top">
              <div>
                <div class="message-name">${message.name || 'Client'}</div>
                <div class="message-meta">${message.email || 'No email provided'} - ${message.phone || 'No phone provided'}</div>
              </div>
              <div class="message-actions">
                <div class="message-meta">${formatDate(message.sentAt)}</div>
                <button class="delete-btn" type="button" data-msgid="${message.id || ''}" data-fbkey="${message.fbKey || message.id || ''}"><i class="fa-solid fa-trash"></i> Delete</button>
              </div>
            </div>
            <div class="message-tags">
              <span class="tag">${message.subject || 'New inquiry'}</span>
            </div>
            <p class="message-body">${message.message || 'No message content provided.'}</p>
          </article>
        `).join('');
      }

      function syncLocalCache(messages) {
        try {
          localStorage.setItem(storageKey, JSON.stringify(messages || []));
        } catch {
          // ignore
        }
      }

      function renderDeletedMessages() {
        const deleted = getDeletedMessages();
        if (!deleted.length) {
          deletedList.innerHTML = '<div class="empty-state"><i class="fa-solid fa-inbox"></i><p>No deleted messages in history.</p></div>';
          return;
        }

        deletedList.innerHTML = deleted.map(message => `
          <article class="message-item">
            <div class="message-top">
              <div>
                <div class="message-name">${message.name || 'Client'}</div>
                <div class="message-meta">${message.email || 'No email provided'} - ${message.phone || 'No phone provided'}</div>
              </div>
              <div class="message-actions">
                <div class="message-meta">${formatDate(message.sentAt)}</div>
                <button class="permanent-delete-btn" type="button" data-msgid="${message.id || ''}"><i class="fa-solid fa-fire"></i> Permanently Delete</button>
              </div>
            </div>
            <div class="message-tags">
              <span class="tag">${message.subject || 'New inquiry'}</span>
            </div>
            <p class="message-body">${message.message || 'No message content provided.'}</p>
          </article>
        `).join('');
      }

      function getLocalMessages() {
        try {
          return JSON.parse(localStorage.getItem(storageKey) || '[]');
        } catch {
          return [];
        }
      }

      function getDeletedMessages() {
        try {
          return JSON.parse(localStorage.getItem(deletedHistoryKey) || '[]');
        } catch {
          return [];
        }
      }

      function saveDeletedMessages(messages) {
        try {
          localStorage.setItem(deletedHistoryKey, JSON.stringify(messages || []));
        } catch {
          // ignore
        }
      }

      list.addEventListener('click', async event => {
        const deleteBtn = event.target.closest('.delete-btn');
        const permDeleteBtn = event.target.closest('.permanent-delete-btn');

        if (deleteBtn) {
          const fbKey = deleteBtn.getAttribute('data-fbkey');
          const msgId = deleteBtn.getAttribute('data-msgid');
          
          console.log('=== DELETE CLICKED ===');
          console.log('fbKey:', fbKey);
          console.log('msgId:', msgId);

          // Move to deleted history instead of permanently deleting
          const messages = getLocalMessages();
          const messageToDelete = messages.find(m => m.id === msgId);
          
          console.log('Message to delete:', messageToDelete);
          
          if (messageToDelete) {
            // Move to deleted history
            const deleted = getDeletedMessages();
            deleted.unshift(messageToDelete);
            saveDeletedMessages(deleted);
            
            // Remove from inbox
            const updated = messages.filter(m => m.id !== msgId);
            syncLocalCache(updated);
            renderMessages(updated);
            
            console.log('Deleted from localStorage. Now deleting from Firebase...');
            
            // Also delete from Firebase
            if (window.firebaseDatabase && fbKey) {
              console.log('Attempting Firebase delete with key:', fbKey);
              try {
                await window.firebaseDatabase.ref('messages/' + fbKey).remove();
                console.log('✓ Firebase delete SUCCESSFUL');
              } catch (error) {
                console.error('✗ Firebase delete FAILED:', error);
              }
            } else {
              console.warn('Cannot delete from Firebase - missing DB or fbKey');
            }
            
            showToast('Message moved to delete history');
          }
        }

        if (permDeleteBtn) {
          const msgId = permDeleteBtn.getAttribute('data-msgid');
          
          console.log('Permanent delete - msgId:', msgId);
          
          // Permanently delete from history
          const deleted = getDeletedMessages();
          const updated = deleted.filter(m => m.id !== msgId);
          saveDeletedMessages(updated);
          renderDeletedMessages();
          showToast('Message permanently deleted');
        }
      });

      // --- Primary: load from Firebase and keep in sync realtime ---
      (function initFirebaseInboxRealtime() {
        const refreshFromRemote = () => {
          if (window.loadMessagesFromSharedInbox) {
            window.loadMessagesFromSharedInbox((msgs) => {
              console.log('Loaded from Firebase:', msgs.length, 'messages');
              renderMessages(msgs);
            });
          } else {
            renderMessages(getLocalMessages());
          }
          renderDeletedMessages();
        };

        if (window.initFirebase) {
          window.initFirebase();
        }

        const db = window.getFirebaseDatabase ? window.getFirebaseDatabase() : null;
        if (db) {
          console.log('Setting up Firebase realtime listener...');
          db.ref('messages').orderByChild('sentAt').on('value', snapshot => {
            console.log('Firebase listener triggered - snapshot has', snapshot.numChildren(), 'children');
            const remoteMessages = [];
            snapshot.forEach(child => {
              const msg = { id: child.key, fbKey: child.key, ...child.val() };
              console.log('Firebase message:', { key: child.key, name: msg.name });
              remoteMessages.push(msg);
            });
            remoteMessages.sort((a, b) => new Date(b.sentAt || 0) - new Date(a.sentAt || 0));
            syncLocalCache(remoteMessages);
            renderMessages(remoteMessages);
          });
        } else {
          console.warn('Firebase database not available');
        }

        refreshFromRemote();
        window.setInterval(refreshFromRemote, 10000);
      })();

    </script>
  </body>
</html>
